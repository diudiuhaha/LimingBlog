# The following content is not recommended to modify
# 搜索数据文件路径设置，不建议改动：
search:
  path: search.json
  field: post

# 文章样式(是否首行缩进)：
post_style:
  indent: 0

# Custom Setting End
# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archive
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md # File name of new posts
default_layout: post
titlecase: false # Transform title into titlecase
external_link: true # Open external links in new tab
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: false
  line_number: true
  auto_detect: true
  tab_replace:

prism_plugin:
  mode: 'preprocess'    # realtime/preprocess
  theme: 'tomorrow'
  line_number: false    # default false
  custom_css:

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
## Hexo uses Moment.js to parse and display date
## You can customize the date format as defined in
## http://momentjs.com/docs/#/displaying/format/
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
## Set per_page to 0 to disable pagination
per_page: 10
pagination_dir: page

# Extensions
## Plugins: https://hexo.io/plugins/
## Themes: https://hexo.io/themes/
theme: aircloud

## 图片懒加载
#lazyload: 
#	enable: true # 是否开启图片懒加载 
#  onlypost: false # 是否只对文章的图片做懒加载 
#	loadingImg: /medias/loading.gif 

# Sitemap 插件配置
sitemap:
  path: sitemap.xml
  tag_dir: tags
  category_dir: categories

# 永久链接设置
# 必须将 permalink 设置为使用 abbrlink 生成的变量
#permalink: posts/:abbrlink
# 或者 permalink: :abbrlink.html (取决于你想要的 URL 结构)

# abbrlink 插件配置
#abbrlink:
#  alg: crc32      # 算法：crc16 或 crc32，推荐 crc32 冲突率更低
#  rep: hex        # 格式：dec (十进制) 或 hex (十六进制)，推荐 hex 更短
#  drafts: false   # 是否处理草稿文章，建议 false

## css压缩
clean_css:
  enable: true
  exclude: ['*.min.css'] # 排除已经压缩过的文件

auto_category:
  enable: true
  depth: 3  # 设置你希望生成分类的文件夹层级深度

# 自动生成分类页
category_generator:
  per_page: 10 # 每页显示文章数，0为关闭分页
  order_by: -date # 排序方式


# 隐藏文章插件配置
hide_posts:
  enable: true
  filter: hidden      # 这里定义你在 Front-matter 中使用的字段名
  noindex: true       # 自动添加 noindex 标签，阻止搜索引擎收录
  public_generators: [] # 确保在所有列表（首页、归档等）中都隐藏

# Deployment
## Docs: https://hexo.io/docs/deployment.html
#deploy:
